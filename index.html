<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morpion AI - Jeu Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Morpion AI</h1>
            <p>Un jeu de morpion 5x5 boosté à l'IA pour battre Fuze !</p>
        </header>

        <main>
            <div class="game-section">
                <div class="status-panel">
                    <div id="status" class="status-text">À O de jouer !</div>
                    <div class="controls">
                        <button id="resetBtn" class="btn">Nouvelle partie</button>
                        <button id="aiMoveBtn" class="btn ai-btn">IA joue (K)</button>
                    </div>
                    <div class="ai-settings">
                        <label for="aiDepth">Difficulté IA:</label>
                        <select id="aiDepth">
                            <option value="2">Facile (2)</option>
                            <option value="3" selected>Normal (3)</option>
                            <option value="4">Difficile (4)</option>
                            <option value="5">Expert (5)</option>
                        </select>
                    </div>
                </div>

                <div class="game-board">
                    <div id="board" class="board"></div>
                </div>

                <div class="ai-panel">
                    <h3>Visualisation IA</h3>
                    <div class="ai-controls">
                        <label>
                            <input type="checkbox" id="showAIThinking" checked>
                            Montrer la réflexion de l'IA
                        </label>
                        <label>
                            Vitesse: <input type="range" id="aiSpeed" min="50" max="500" value="200">
                        </label>
                    </div>
                    <div id="aiStatus" class="ai-status">IA prête</div>
                </div>
            </div>
        </main>

        <footer>
            <p>Transformé en projet web - GPL v3 licence</p>
        </footer>
    </div>

    <script src="morpion-ai.js"></script>
</body>
</html>
